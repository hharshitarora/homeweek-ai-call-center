<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" type="image/png" href="favicon.png">
  <title>Homeseek Command Center</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f7;
      --bg-tertiary: #fafafa;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --text-tertiary: #aeaeb2;
      --separator: rgba(60, 60, 67, 0.12);
      --blue: #007aff;
      --green: #34c759;
      --orange: #ff9500;
      --red: #ff3b30;
      --purple: #af52de;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 18px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-stack);
      background: var(--bg-secondary);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      overflow: hidden; /* App-like feel */
    }

    /* --- Layout --- */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* --- Navbar --- */
    .navbar {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--separator);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 20;
    }

    .navbar-logo {
      height: 32px;
      width: auto;
      object-fit: contain;
    }
    
    .navbar-title {
      font-size: 18px;
      font-weight: 600;
      margin-left: 12px;
    }

    .navbar-left { display: flex; align-items: center; }

    .navbar-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* --- Stats Bar --- */
    .stats-bar {
      background: var(--bg);
      border-bottom: 1px solid var(--separator);
      padding: 12px 24px;
      display: flex;
      gap: 32px;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      min-width: 100px;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .stat-value.highlight { color: var(--blue); }

    /* --- Command Bar (Filters) --- */
    .command-bar {
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.1);
      background: var(--bg);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
    }

    .filter-select {
      padding: 8px 32px 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.1);
      background: var(--bg);
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2386868b' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
    }

    /* --- Main Content Area --- */
    .main-content {
      flex: 1;
      overflow: hidden;
      position: relative;
      display: flex;
    }

    /* --- Data Table --- */
    .table-container {
      flex: 1;
      overflow: auto;
      padding: 0 24px 24px;
    }

    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }

    .data-table th {
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      backdrop-filter: blur(10px);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--separator);
      z-index: 10;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    .data-table th:hover { color: var(--text-primary); }

    .data-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--separator);
      background: var(--bg);
      vertical-align: middle;
      color: var(--text-primary);
    }

    .data-table tr:hover td {
      background: #f0f0f5;
      cursor: pointer;
    }

    .data-table tr.selected td {
      background: rgba(0, 122, 255, 0.1);
    }

    .data-table tr.row-selected td {
      background: rgba(255, 59, 48, 0.05);
    }

    .row-checkbox {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .data-table tr.row-selected td {
      background: rgba(255, 59, 48, 0.05);
    }

    .row-checkbox {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .col-name { font-weight: 500; min-width: 140px; }
    .col-phone { font-family: 'SF Mono', SFMono-Regular, ui-monospace, monospace; color: var(--text-secondary); }
    .col-status { width: 120px; }
    .col-outcome { width: 140px; }
    .col-date { white-space: nowrap; color: var(--text-secondary); font-size: 12px; }
    .col-notes { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-secondary); }
    .col-actions { width: 80px; text-align: right; }

    /* --- Status Badges --- */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-queued { background: #fff8e1; color: #b78a05; }
    .status-queued .badge-dot { background: #ffc107; }
    
    .status-calling { background: #e3f2fd; color: #1565c0; }
    .status-calling .badge-dot { background: #2196f3; }
    
    .status-completed { background: #e8f5e9; color: #2e7d32; }
    .status-completed .badge-dot { background: #4caf50; }
    
    .status-failed { background: #ffebee; color: #c62828; }
    .status-failed .badge-dot { background: #f44336; }
    
    .status-no_answer { background: #fff3e0; color: #e65100; }
    .status-no_answer .badge-dot { background: var(--orange); }
    
    .status-voicemail { background: #f3e5f5; color: #6a1b9a; }
    .status-voicemail .badge-dot { background: var(--purple); }
    
    .status-opt_out { background: #f5f5f5; color: #616161; }
    .status-opt_out .badge-dot { background: #9e9e9e; }

    .outcome-interested { color: var(--green); background: rgba(52, 199, 89, 0.1); }
    .outcome-voicemail { color: var(--purple); background: rgba(175, 82, 222, 0.1); }
    .outcome-no_answer { color: var(--orange); background: rgba(255, 149, 0, 0.1); }
    .outcome-opt_out { color: var(--text-tertiary); background: rgba(0,0,0,0.05); text-decoration: line-through; }
    .outcome-human_followup { color: var(--blue); background: rgba(0, 122, 255, 0.1); }

    /* --- Drawer (Slide-out) --- */
    .drawer-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(2px);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }

    .drawer {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 500px;
      background: var(--bg);
      box-shadow: var(--shadow-lg);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 40;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--separator);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--separator);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
    }

    .drawer-title { font-size: 18px; font-weight: 600; }
    .drawer-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .drawer-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      color: var(--text-secondary);
      border-radius: 50%;
    }
    .drawer-close:hover { background: rgba(0,0,0,0.05); color: var(--text-primary); }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .drawer-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--separator);
      background: var(--bg-tertiary);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    /* --- Buttons --- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    .btn-primary { background: var(--blue); color: white; border-color: transparent; }
    .btn-primary:hover { filter: brightness(1.1); }
    
    .btn-secondary { background: white; color: var(--text-primary); border-color: var(--separator); }
    .btn-secondary:hover { background: #f9f9f9; border-color: #d1d1d6; }
    
    .btn-tertiary { background: transparent; color: var(--text-primary); border-color: transparent; }
    .btn-tertiary:hover { background: var(--bg-secondary); }

    .btn-call { background: var(--green); color: white; }
    .btn-call:hover { filter: brightness(1.05); }
    .btn-call:disabled { background: var(--bg-secondary); color: var(--text-tertiary); cursor: not-allowed; }

    .btn-destructive { color: var(--red); background: rgba(255, 59, 48, 0.1); }
    .btn-destructive:hover { background: rgba(255, 59, 48, 0.15); }

    /* --- Export dropdown --- */
    .export-wrap { position: relative; }
    .export-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      min-width: 240px;
      background: var(--bg);
      border: 1px solid var(--separator);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      z-index: 30;
      padding: 4px;
    }
    .export-dropdown.open { display: block; }
    .export-dropdown-item {
      display: block;
      width: 100%;
      padding: 10px 12px;
      text-align: left;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-primary);
      background: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .export-dropdown-item:hover { background: var(--bg-secondary); }

    /* --- Form Styles (reused/adapted) --- */
    .form-section { padding: 20px 24px 0; }
    .form-section-title {
      font-size: 11px; font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;
    }
    
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-primary); }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--separator);
      background: white;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
    }
    .form-textarea { min-height: 80px; resize: vertical; }

    /* --- Loading/Empty --- */
    .loading-container { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text-secondary); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #333; color: white; padding: 10px 20px; border-radius: 50px;
      font-size: 14px; font-weight: 500; opacity: 0; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: var(--red); }

    /* --- Login screen (email OTP) --- */
    #loginScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg-secondary);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #loginScreen.visible { display: flex; }
    .login-box {
      background: var(--bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 32px;
      width: 100%;
      max-width: 380px;
    }
    .login-box h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .login-box p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .login-box .form-group { margin-bottom: 16px; }
    .login-box .form-label { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .login-box .form-input {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--separator);
      font-size: 16px;
    }
    .login-box .form-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
    }
    .login-box .btn-block { width: 100%; justify-content: center; margin-top: 8px; }
  </style>
</head>
<body>
  <!-- Login screen (shown when auth enabled and not logged in) -->
  <div id="loginScreen">
    <div class="login-box">
      <h1>Command Center</h1>
      <p>Sign in with your username and password.</p>
      <div class="form-group">
        <label class="form-label" for="loginUsername">Username</label>
        <input type="text" id="loginUsername" class="form-input" placeholder="Username" autocomplete="username" onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button type="button" class="btn btn-primary btn-block" id="loginBtn" onclick="doLogin()">Log in</button>
      <p id="loginMessage" style="margin-top:16px; font-size:13px; color:var(--text-secondary); display:none;"></p>
    </div>
  </div>

  <div class="app" id="appContent">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-left">
        <img src="Homeseek logo.jpg" alt="Homeseek" class="navbar-logo">
        <span class="navbar-title">Command Center</span>
      </div>
      <div class="navbar-actions">
        <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="handleCsvUpload(event)">
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('csvFileInput').click()">Import CSV</button>
        <button class="btn btn-secondary btn-sm" onclick="loadData()">Refresh</button>
        <div style="position:relative; display:inline-block;">
          <button class="btn btn-secondary btn-sm" onclick="toggleBulkMenu()">⚡ Bulk Actions</button>
          <div id="bulkMenu" style="display:none; position:absolute; right:0; top:100%; background:white; border:1px solid var(--separator); border-radius:8px; box-shadow:var(--shadow-md); padding:8px; min-width:220px; z-index:100; margin-top:4px;">
            <div style="padding:4px 8px 12px; border-bottom:1px solid var(--separator); margin-bottom:4px;">
              <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">
                Hinglish Ratio: <span id="bolnaRatioLabel">0</span>%
              </label>
              <div style="display:flex; align-items:center; gap:8px;">
                <span style="font-size:11px; color:var(--text-tertiary);">EN</span>
                <input type="range" id="bolnaRatioSlider" min="0" max="100" value="0" step="10" 
                  style="flex:1; cursor:pointer;" 
                  oninput="document.getElementById('bolnaRatioLabel').textContent = this.value">
                <span style="font-size:11px; color:var(--text-tertiary);">HI</span>
              </div>
              <div style="font-size:10px; color:var(--text-tertiary); margin-top:4px;">
                0% = All English (Bland) | 100% = All Hinglish (Bolna)
              </div>
            </div>
            <button class="btn btn-tertiary btn-sm" style="width:100%; justify-content:flex-start;" onclick="triggerBulkCall(5)">Call 5 Leads</button>
            <button class="btn btn-tertiary btn-sm" style="width:100%; justify-content:flex-start;" onclick="triggerBulkCall(25)">Call 25 Leads</button>
            <button class="btn btn-tertiary btn-sm" style="width:100%; justify-content:flex-start;" onclick="triggerBulkCall(50)">Call 50 Leads</button>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openAddDrawer()">+ New Lead</button>
        <button class="btn btn-tertiary btn-sm" id="logoutBtn" onclick="logout()" style="display:none;">Log out</button>
      </div>
    </nav>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <span class="stat-label">Total Leads</span>
        <span class="stat-value" id="statTotal">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Interested</span>
        <span class="stat-value highlight" id="statInterested">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Follow Up</span>
        <span class="stat-value" id="statFollowUp">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Completion</span>
        <span class="stat-value" id="statCompletion">0%</span>
      </div>
    </div>

    <!-- Command Bar -->
    <div class="command-bar">
      <input type="text" id="searchInput" class="search-input" placeholder="Search name or phone..." oninput="handleFilterChange()">
      
      <select id="statusFilter" class="filter-select" onchange="handleFilterChange()">
        <option value="">All Statuses</option>
        <option value="queued">Queued</option>
        <option value="calling">Calling</option>
        <option value="completed">Completed</option>
        <option value="failed">Failed</option>
      </select>

      <select id="outcomeFilter" class="filter-select" onchange="handleFilterChange()">
        <option value="">All Outcomes</option>
        <option value="interested">Interested</option>
        <option value="human_followup">Follow Up</option>
        <option value="voicemail">Voicemail</option>
        <option value="no_answer">No Answer</option>
        <option value="opt_out">Opt Out</option>
      </select>

      <button id="bulkDeleteBtn" class="btn btn-destructive btn-sm" onclick="handleBulkDelete()" style="display:none;">
        Delete Selected (<span id="selectedCount">0</span>)
      </button>

      <div class="export-wrap">
        <button type="button" id="exportCsvBtn" class="btn btn-secondary btn-sm" onclick="toggleExportMenu(event)" aria-haspopup="true" aria-expanded="false">
          Export to CSV ▾
        </button>
        <div id="exportDropdown" class="export-dropdown" role="menu" aria-hidden="true">
          <button type="button" class="export-dropdown-item" role="menuitem" onclick="exportToCSV('current')">Current view (<span id="exportCurrentCount">0</span> rows)</button>
          <button type="button" class="export-dropdown-item" role="menuitem" onclick="exportToCSV('interested')">Interested leads only (<span id="exportInterestedCount">0</span> rows)</button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="table-container">
        <table class="data-table" id="dataTable">
          <thead>
            <tr>
              <th style="width:40px;">
                <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(event)">
              </th>
              <th onclick="handleSort('lead_name')">Name</th>
              <th onclick="handleSort('phone_e164')">Phone</th>
              <th onclick="handleSort('call_status')">Status</th>
              <th onclick="handleSort('outcome')">Outcome</th>
              <th onclick="handleSort('last_call_at')">Last Call</th>
              <th>Notes</th>
              <th></th> <!-- Actions -->
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Rows injected by JS -->
          </tbody>
        </table>
      </div>

      <!-- Drawer Overlay -->
      <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

      <!-- Drawer -->
      <div class="drawer" id="drawer">
        <!-- Injected by JS -->
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    // --- Configuration ---
    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const PRODUCTION_API = 'https://homeweek-ai-call-center-production.up.railway.app';
    const LOCAL_API = 'http://localhost:3000';
    const API_BASE_URL = window.API_BASE_URL || (isLocalhost ? LOCAL_API : PRODUCTION_API);

    const fetchOpts = (opts = {}) => ({ ...opts, credentials: 'include' });

    // --- Auth (OTP login) ---
    let authRequired = false;

    async function checkAuth() {
      try {
        const res = await fetch(`${API_BASE_URL}/auth/me`, fetchOpts());
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok && data.user && data.user !== 'anonymous') {
          authRequired = true;
          showApp();
          loadData();
          const logoutBtn = document.getElementById('logoutBtn');
          if (logoutBtn) logoutBtn.style.display = 'inline-flex';
          return;
        }
        if (res.status === 401) {
          authRequired = true;
          showLoginScreen();
          return;
        }
        showApp();
        loadData();
      } catch (e) {
        showApp();
        loadData();
      }
    }

    function showLoginScreen() {
      document.getElementById('loginScreen').classList.add('visible');
      document.getElementById('appContent').style.display = 'none';
      document.getElementById('loginUsername').value = '';
      const pw = document.getElementById('loginPassword');
      if (pw) pw.value = '';
      const msg = document.getElementById('loginMessage');
      if (msg) msg.style.display = 'none';
    }

    function showApp() {
      document.getElementById('loginScreen').classList.remove('visible');
      document.getElementById('appContent').style.display = '';
    }

    function setLoginMessage(text, isError) {
      const el = document.getElementById('loginMessage');
      if (!el) return;
      el.textContent = text;
      el.style.display = text ? 'block' : 'none';
      el.style.color = isError ? 'var(--red)' : 'var(--text-secondary)';
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!username) { setLoginMessage('Enter your username.', true); return; }
      if (!password) { setLoginMessage('Enter your password.', true); return; }
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      setLoginMessage('');
      try {
        const res = await fetch(`${API_BASE_URL}/auth/login`, fetchOpts({ method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) }));
        const data = await res.json().catch(() => ({}));
        if (data.ok) {
          showApp();
          loadData();
          document.getElementById('logoutBtn').style.display = 'inline-flex';
        } else {
          setLoginMessage(data.error || 'Login failed.', true);
        }
      } catch (e) {
        setLoginMessage('Network error. Try again.', true);
      }
      btn.disabled = false;
    }

    async function logout() {
      try {
        await fetch(`${API_BASE_URL}/auth/logout`, fetchOpts({ method: 'POST' }));
      } catch (_) {}
      document.getElementById('logoutBtn').style.display = 'none';
      showLoginScreen();
    }

    // --- State ---
    let allRecords = [];
    let filteredRecords = [];
    let currentSort = { field: 'created_at', dir: 'desc' };
    let currentFilter = { text: '', status: '', outcome: '' };
    let selectedRecordId = null; // Use Supabase id
    let selectedRows = new Set(); // For bulk selection (stores ids)
    let isEditing = false;
    let isAdding = false;

    // --- Formatters ---
    const formatDate = (isoString) => {
      if (!isoString) return '—';
      const d = new Date(isoString);
      return d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    };

    const formatPhone = (phone) => {
      if (!phone) return '';
      // Simple formatter for +91
      return phone.replace('+91', '+91 ');
    };

    const OUTCOME_LABELS = {
      'interested': 'Interested',
      'human_followup': 'Follow Up',
      'voicemail': 'Voicemail',
      'no_answer': 'No Answer',
      'opt_out': 'Opt Out',
      'none': 'None'
    };

    // --- Core Logic ---

    async function loadData() {
      try {
        const res = await fetch(`${API_BASE_URL}/rows`, fetchOpts());
        const data = await res.json().catch(() => ({}));
        if (res.status === 401 && authRequired) {
          showLoginScreen();
          return;
        }
        if (!data.ok) throw new Error(data.error);
        
        allRecords = data.rows || [];
        updateStats();
        applyFilters(); // This triggers render (and updateExportCounts)
      } catch (e) {
        const msg = isLocalhost && (e.message === 'Failed to fetch' || e.name === 'TypeError')
          ? 'Failed to load data. Is the server running? (npm run dev on port 3000)'
          : 'Failed to load data';
        showToast(msg, true);
        console.error(e);
      }
    }

    function updateStats() {
      const total = allRecords.length;
      const interested = allRecords.filter(r => r.outcome === 'interested').length;
      const followup = allRecords.filter(r => r.outcome === 'human_followup').length;
      
      const completed = allRecords.filter(r => r.call_status === 'completed' || r.call_status === 'failed').length;
      const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statInterested').textContent = interested;
      document.getElementById('statFollowUp').textContent = followup;
      document.getElementById('statCompletion').textContent = `${rate}%`;
    }

    function handleFilterChange() {
      currentFilter.text = document.getElementById('searchInput').value.toLowerCase();
      currentFilter.status = document.getElementById('statusFilter').value;
      currentFilter.outcome = document.getElementById('outcomeFilter').value;
      applyFilters();
    }

    function applyFilters() {
      filteredRecords = allRecords.filter(r => {
        // Text Search
        const textMatch = 
          (r.lead_name && r.lead_name.toLowerCase().includes(currentFilter.text)) ||
          (r.phone_e164 && r.phone_e164.includes(currentFilter.text));
        
        // Status Filter
        const statusMatch = !currentFilter.status || r.call_status === currentFilter.status;

        // Outcome Filter
        const outcomeMatch = !currentFilter.outcome || r.outcome === currentFilter.outcome;

        return textMatch && statusMatch && outcomeMatch;
      });

      sortRecords();
    }

    function handleSort(field) {
      if (currentSort.field === field) {
        currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.field = field;
        currentSort.dir = 'asc'; // Default to asc for new field
        if (field === 'created_at' || field === 'last_call_at') currentSort.dir = 'desc';
      }
      sortRecords();
    }

    function sortRecords() {
      const { field, dir } = currentSort;
      
      filteredRecords.sort((a, b) => {
        let va = a[field] || '';
        let vb = b[field] || '';
        
        // Handle numbers/dates if needed, simplistic string compare for now
        if (va < vb) return dir === 'asc' ? -1 : 1;
        if (va > vb) return dir === 'asc' ? 1 : -1;
        return 0;
      });

      renderTable();
    }

    // --- Rendering ---

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      
      if (filteredRecords.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">No leads found matching your filters.</div></td></tr>`;
        updateExportCounts();
        return;
      }

      tbody.innerHTML = filteredRecords.map(r => {
        const recordId = r.id;
        const status = r.call_status || 'queued';
        const outcome = r.outcome || '';
        const outcomeLabel = OUTCOME_LABELS[outcome] || outcome || '—';
        const isSelected = selectedRecordId === recordId;

        // Status badge
        const statusBadge = `<span class="badge status-${status}"><span class="badge-dot"></span>${status}</span>`;

        // Outcome badge
        const outcomeBadge = outcome ? `<span class="badge outcome-${outcome}">${outcomeLabel}</span>` : '—';

        const isRowSelected = selectedRows.has(recordId);

        return `
          <tr class="${isSelected ? 'selected' : ''} ${isRowSelected ? 'row-selected' : ''}" onclick="openDrawer('${recordId}')">
            <td onclick="event.stopPropagation();">
              <input type="checkbox" class="row-checkbox" data-row="${recordId}" ${isRowSelected ? 'checked' : ''} onchange="toggleRowSelection('${recordId}', event)">
            </td>
            <td class="col-name">
              <div style="font-weight:600">${r.lead_name || 'Untitled'}</div>
            </td>
            <td class="col-phone">${formatPhone(r.phone_e164)}</td>
            <td class="col-status">${statusBadge}</td>
            <td class="col-outcome">${outcomeBadge}</td>
            <td class="col-date">${formatDate(r.last_call_at)}</td>
            <td class="col-notes">${r.notes || r.summary || ''}</td>
            <td class="col-actions">
              <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); openDrawer('${recordId}')">View</button>
            </td>
          </tr>
        `;
      }).join('');
      
      // Update bulk selection UI after rendering
      updateBulkDeleteButton();
      updateSelectAllCheckbox();
      updateExportCounts();
    }

    function updateExportCounts() {
      const currentEl = document.getElementById('exportCurrentCount');
      const interestedEl = document.getElementById('exportInterestedCount');
      if (currentEl) currentEl.textContent = filteredRecords.length;
      const interestedCount = allRecords.filter(r => r.outcome === 'interested').length;
      if (interestedEl) interestedEl.textContent = interestedCount;
    }

    function renderDrawer(record, editing = false, adding = false) {
      const container = document.getElementById('drawer');
      
      const title = adding ? 'Add New Lead' : (record.lead_name || record.phone_e164);
      const subtitle = adding ? 'Enter lead details' : (record.phone_e164 || 'No phone number');
      
      const canCall = !adding && record.phone_e164?.startsWith('+') && record.call_status !== 'calling';

      // Define fields to render
      const fields = [
        { key: 'lead_name', label: 'Name', type: 'text' },
        { key: 'phone_e164', label: 'Phone (+91...)', type: 'text', required: true },
        { key: 'property_address', label: 'Property Address', type: 'text' },
        { key: 'property_price_inr', label: 'Price Estimate', type: 'text' },
        { key: 'notes', label: 'Notes', type: 'textarea' },
        { key: 'outcome', label: 'Outcome', type: 'select', options: OUTCOME_LABELS, readonly: !editing }, 
        { key: 'call_status', label: 'Status', type: 'select', options: {'queued':'Queued', 'calling':'Calling', 'completed':'Completed'}, readonly: !editing }
      ];

      // Form Generator
      const generateField = (f) => {
        const val = adding ? '' : (record[f.key] || '');
        const isReadonly = f.readonly || (!editing && !adding);
        
        if (f.type === 'select') {
          if (isReadonly) return renderStaticField(f.label, f.options[val] || val || '—');
          
          // Add empty option first, then other options
          const opts = `<option value="">— Select —</option>` + 
            Object.entries(f.options).map(([k, v]) => 
              `<option value="${k}" ${val === k ? 'selected' : ''}>${v}</option>`
            ).join('');
          
          return `
            <div class="form-group">
              <label class="form-label">${f.label}</label>
              <select name="${f.key}" class="form-select">${opts}</select>
            </div>
          `;
        }
        
        if (isReadonly) return renderStaticField(f.label, val || '—');

        if (f.type === 'textarea') {
          return `
            <div class="form-group">
              <label class="form-label">${f.label}</label>
              <textarea name="${f.key}" class="form-textarea" placeholder="${f.label}">${val}</textarea>
            </div>
          `;
        }

        return `
          <div class="form-group">
            <label class="form-label">${f.label} ${f.required ? '*' : ''}</label>
            <input type="${f.type}" name="${f.key}" class="form-input" value="${val}" placeholder="${f.label}" ${f.required ? 'required' : ''}>
          </div>
        `;
      };

      const renderStaticField = (label, val) => `
        <div class="form-group">
          <label class="form-label" style="color:var(--text-secondary); font-size:11px; text-transform:uppercase;">${label}</label>
          <div style="font-size:14px; color:var(--text-primary);">${val}</div>
        </div>
      `;

      // HTML Structure
      container.innerHTML = `
        <div class="drawer-header">
          <div>
            <div class="drawer-title">${title}</div>
            <div class="drawer-subtitle">${subtitle}</div>
          </div>
          <button class="drawer-close" onclick="closeDrawer()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>

        <form id="drawerForm" class="drawer-body" onsubmit="handleFormSubmit(event)">
          <!-- Action Buttons (if view mode) -->
          ${!editing && !adding ? `
            <div style="padding: 20px 24px 0; display:flex; flex-direction:column; gap:10px;">
              <div style="display:flex; gap:8px;">
                <button type="button" class="btn btn-call" style="flex:1" ${!canCall ? 'disabled' : ''} onclick="triggerCall('${record.id}', 'bland')">
                  ${record.call_status === 'calling' ? 'Calling...' : '🇺🇸 Call (English)'}
                </button>
                <button type="button" class="btn btn-call" style="flex:1; background: linear-gradient(135deg, #ff9500 0%, #ff6b00 100%);" ${!canCall ? 'disabled' : ''} onclick="triggerCall('${record.id}', 'bolna')">
                  ${record.call_status === 'calling' ? 'Calling...' : '🇮🇳 Call (Hinglish)'}
                </button>
              </div>
              <button type="button" class="btn btn-secondary" onclick="openDrawer('${record.id}', true)">Edit</button>
            </div>
          ` : ''}

          <div class="form-section">
            <div class="form-section-title">Lead Information</div>
            ${fields.map(generateField).join('')}
          </div>

          <!-- Transcript (View Only) -->
          ${!adding && record.transcript ? `
            <div class="form-section">
              <div class="form-section-title">Latest Call Transcript</div>
              <div style="background:var(--bg-secondary); padding:12px; border-radius:8px; font-size:13px; white-space:pre-wrap; max-height:300px; overflow-y:auto;">${record.transcript}</div>
            </div>
          ` : ''}

          ${!adding && !editing ? `
            <div class="form-section" style="margin-top:20px;">
               <button type="button" class="btn btn-destructive btn-sm" onclick="handleDelete('${record.id}')">Delete Lead</button>
            </div>
          ` : ''}

          <div style="height: 40px;"></div>
        </form>

        ${editing || adding ? `
          <div class="drawer-footer">
            <button class="btn btn-secondary" onclick="${adding ? 'closeDrawer()' : `openDrawer('${record.id}')`}">Cancel</button>
            <button class="btn btn-primary" onclick="document.getElementById('drawerForm').dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}))">Save Changes</button>
          </div>
        ` : ''}
      `;
    }

    // --- Actions ---

    function openDrawer(id, editing = false) {
      isAdding = false;
      isEditing = editing;
      selectedRecordId = id;

      const record = allRecords.find(r => r.id === id);
      if (!record) return;

      renderDrawer(record, editing, false);

      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');

      // Update table highlight
      renderTable();
    }

    function openAddDrawer() {
      isAdding = true;
      isEditing = true;
      selectedRecordId = null;

      renderDrawer({}, true, true);

      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');
    }

    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('open');
      selectedRecordId = null;
      renderTable();
    }

    async function handleFormSubmit(e) {
      e.preventDefault();

      const formData = new FormData(e.target);
      const data = {};
      formData.forEach((value, key) => {
        // Only include non-empty values (skip empty strings from select dropdowns)
        if (value.trim() !== '') {
          data[key] = value.trim();
        }
      });

      // Validation
      if (!data.phone_e164 || !data.phone_e164.startsWith('+')) {
        showToast('Phone must start with + (e.g., +91...)', true);
        return;
      }

      const recordId = isAdding ? null : selectedRecordId;
      const endpoint = isAdding ? '/add-row' : '/update-row';
      const method = isAdding ? 'POST' : 'PUT';
      const payload = isAdding ? { data } : { id: recordId, data };

      try {
        const res = await fetch(`${API_BASE_URL}${endpoint}`, fetchOpts({
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }));

        const resData = await res.json();
        if (!resData.ok) throw new Error(resData.error);

        showToast(isAdding ? 'Lead Added' : 'Saved Successfully');
        await loadData(); // Reload data

        if (isAdding) closeDrawer();
        else openDrawer(recordId, false); // Switch back to view mode

      } catch (err) {
        showToast(err.message || 'Failed to save', true);
      }
    }

    async function triggerCall(id, provider = 'bland') {
      try {
        const providerLabel = provider === 'bolna' ? 'Hinglish' : 'English';

        const res = await fetch(`${API_BASE_URL}/trigger-call`, fetchOpts({
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, provider })
        }));

        const data = await res.json();
        
        if (res.status === 401) {
          showToast('Session expired or not logged in. Please log in again.', true);
          checkAuth();
          return;
        }
        if (res.status === 409) {
          showToast('Call already in progress', true);
        } else if (!data.ok) {
          throw new Error(data.error);
        } else {
          showToast(`Calling via ${providerLabel}...`);
        }

        await loadData();
        // Refresh drawer if open
        if (selectedRecordId === id) openDrawer(id, false);
      } catch (e) {
        const isNetworkError = e.message === 'Failed to fetch' || e.name === 'TypeError';
        const msg = isLocalhost && isNetworkError
          ? 'Cannot reach server. Is it running? (npm run dev)'
          : (e.message || 'Call failed');
        showToast(msg, true);
      }
    }

    async function handleDelete(id) {
      if(!confirm('Delete this lead?')) return;
      try {
        const res = await fetch(`${API_BASE_URL}/delete-row`, fetchOpts({
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        }));
        const d = await res.json();
        if(!d.ok) throw new Error(d.error);

        showToast('Lead deleted');
        closeDrawer();
        loadData();
      } catch(e) {
        showToast(e.message, true);
      }
    }

    // Reuse existing CSV upload logic (simplified for this view)
    async function handleCsvUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const formData = new FormData();
      formData.append('csv', file);
      
      try {
        showToast('Uploading...');
        const res = await fetch(`${API_BASE_URL}/upload-csv`, fetchOpts({ method: 'POST', body: formData }));
        const data = await res.json();
        if(!data.ok) throw new Error(data.error);
        
        showToast(`Imported ${data.inserted} leads`);
        loadData();
      } catch(e) {
        showToast('Upload failed', true);
      }
      event.target.value = '';
    }

    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + (isError ? 'error' : '');
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 3000);
    }

    // --- Bulk Actions ---
    function toggleBulkMenu() {
      const el = document.getElementById('bulkMenu');
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('bulkMenu');
      const btn = document.querySelector('button[onclick="toggleBulkMenu()"]');
      if (menu && menu.style.display === 'block' && !menu.contains(e.target) && !btn.contains(e.target)) {
        menu.style.display = 'none';
      }
    });

    async function triggerBulkCall(limit) {
      const bolnaRatio = parseInt(document.getElementById('bolnaRatioSlider')?.value || '0', 10);
      toggleBulkMenu();
      
      const ratioText = bolnaRatio === 0 ? 'all English (Bland)' : 
                        bolnaRatio === 100 ? 'all Hinglish (Bolna)' : 
                        `${100 - bolnaRatio}% English + ${bolnaRatio}% Hinglish`;
      
      if (!confirm(`Start ${limit} calls with ${ratioText}?\n\nThis will trigger calls immediately.`)) return;

      try {
        showToast(`Starting batch of ${limit} calls (${ratioText})...`);
        
        const res = await fetch(`${API_BASE_URL}/run-dialer`, fetchOpts({
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ limit, bolna_ratio: bolnaRatio })
        }));

        const data = await res.json();
        
        if (!data.ok) throw new Error(data.error);
        
        showToast(data.message || `Batch started for ${data.processed} leads`);
        await loadData();
        
      } catch (e) {
        showToast(e.message || 'Batch call failed', true);
        console.error(e);
      }
    }

    // --- Bulk Selection ---
    function toggleRowSelection(id, event) {
      if (event) event.stopPropagation();

      if (selectedRows.has(id)) {
        selectedRows.delete(id);
      } else {
        selectedRows.add(id);
      }

      updateBulkDeleteButton();
      updateSelectAllCheckbox();
    }

    function toggleSelectAll(event) {
      if (event) event.stopPropagation();

      const checkbox = document.getElementById('selectAllCheckbox');
      const isChecked = checkbox.checked;

      if (isChecked) {
        // Select all visible rows
        filteredRecords.forEach(r => selectedRows.add(r.id));
      } else {
        // Deselect all
        selectedRows.clear();
      }

      // Update all checkboxes
      document.querySelectorAll('.row-checkbox').forEach(cb => {
        cb.checked = isChecked;
      });

      updateBulkDeleteButton();
    }

    function updateSelectAllCheckbox() {
      const checkbox = document.getElementById('selectAllCheckbox');
      if (!checkbox) return;

      const allSelected = filteredRecords.length > 0 &&
        filteredRecords.every(r => selectedRows.has(r.id));
      const someSelected = filteredRecords.some(r => selectedRows.has(r.id));

      checkbox.checked = allSelected;
      checkbox.indeterminate = someSelected && !allSelected;
    }

    function updateBulkDeleteButton() {
      const btn = document.getElementById('bulkDeleteBtn');
      const countSpan = document.getElementById('selectedCount');

      if (selectedRows.size > 0) {
        btn.style.display = 'inline-flex';
        countSpan.textContent = selectedRows.size;
      } else {
        btn.style.display = 'none';
      }
    }

    // --- Export to CSV ---
    function toggleExportMenu(event) {
      event.stopPropagation();
      const menu = document.getElementById('exportDropdown');
      const btn = document.getElementById('exportCsvBtn');
      const isOpen = menu.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen);
      menu.setAttribute('aria-hidden', !isOpen);
      if (isOpen) {
        document.addEventListener('click', closeExportMenuOnce);
      } else {
        document.removeEventListener('click', closeExportMenuOnce);
      }
    }

    function closeExportMenuOnce() {
      const menu = document.getElementById('exportDropdown');
      menu.classList.remove('open');
      document.getElementById('exportCsvBtn').setAttribute('aria-expanded', 'false');
      menu.setAttribute('aria-hidden', 'true');
      document.removeEventListener('click', closeExportMenuOnce);
    }

    function escapeCSVCell(val) {
      if (val == null || val === '') return '';
      const s = String(val).replace(/"/g, '""');
      if (/[",\r\n]/.test(s)) return `"${s}"`;
      return s;
    }

    function buildAndDownloadCSV(records, filename) {
      const headers = ['Name', 'Phone', 'Email', 'Property Address', 'Price', 'Status', 'Outcome', 'Last Call', 'Notes', 'Summary'];
      const rows = records.map(r => {
        const outcomeLabel = OUTCOME_LABELS[r.outcome] || r.outcome || '';
        const lastCall = r.last_call_at ? new Date(r.last_call_at).toLocaleString() : '';
        return [
          r.lead_name || '',
          r.phone_e164 || '',
          r.email || '',
          r.property_address || '',
          r.property_price_inr || '',
          r.call_status || '',
          outcomeLabel,
          lastCall,
          (r.notes || '').replace(/\r?\n/g, ' '),
          (r.summary || '').replace(/\r?\n/g, ' ')
        ].map(escapeCSVCell);
      });
      const headerLine = headers.map(escapeCSVCell).join(',');
      const bodyLines = rows.map(row => row.join(','));
      const csv = [headerLine, ...bodyLines].join('\r\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      closeExportMenuOnce();
    }

    function exportToCSV(mode) {
      const records = mode === 'interested'
        ? allRecords.filter(r => r.outcome === 'interested')
        : filteredRecords;
      if (records.length === 0) {
        showToast(mode === 'interested' ? 'No interested leads to export.' : 'No rows in current view to export.', true);
        return;
      }
      const suffix = mode === 'interested' ? 'interested-leads' : 'leads-view';
      const filename = `homeseek-${suffix}-${new Date().toISOString().slice(0, 10)}.csv`;
      buildAndDownloadCSV(records, filename);
      showToast(`Exported ${records.length} lead(s) to ${filename}`);
    }

    async function handleBulkDelete() {
      const count = selectedRows.size;
      if (count === 0) return;

      if (!confirm(`Are you sure you want to delete ${count} lead(s)? This action cannot be undone.`)) {
        return;
      }

      try {
        const ids = Array.from(selectedRows);
        showToast(`Deleting ${count} lead(s)...`);

        const res = await fetch(`${API_BASE_URL}/delete-rows-bulk`, fetchOpts({
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids })
        }));

        const data = await res.json();

        if (!data.ok) throw new Error(data.error);

        showToast(`${count} lead(s) deleted successfully`);
        selectedRows.clear();
        updateBulkDeleteButton();
        updateSelectAllCheckbox();
        await loadData();

      } catch (e) {
        showToast(e.message || 'Bulk delete failed', true);
        console.error(e);
      }
    }

    // --- Init ---
    checkAuth();

    // No automatic polling - refresh only on user actions
    // Use the Refresh button to manually update data

  </script>
</body>
</html>
