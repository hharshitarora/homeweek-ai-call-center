<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" type="image/png" href="favicon.png">
  <title>Homeseek Dataset Library</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d9e2ec;
      --blue: #1d4ed8;
      --blue-soft: #dbeafe;
      --radius: 14px;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 34px; width: auto; }
    .brand h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }

    .btn {
      border: 1px solid transparent;
      background: white;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { border-color: var(--line); }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { filter: brightness(1.05); border-color: transparent; }

    .panel {
      background: var(--panel);
      border: 1px solid #e8eef5;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .kpis { display: grid; grid-template-columns: repeat(3, minmax(140px, 1fr)); gap: 12px; margin-bottom: 14px; }
    .kpi { background: #f9fbff; border: 1px solid #e7eef8; border-radius: 12px; padding: 10px 12px; }
    .kpi .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .kpi .value { font-size: 22px; font-weight: 700; margin-top: 3px; }

    .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; margin-top: 10px; }
    .tile {
      border: 1px solid #e5edf6;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }
    .tile:hover { transform: translateY(-2px); border-color: #c9daf2; box-shadow: 0 10px 22px rgba(29, 78, 216, 0.08); }
    .tile.initial { background: linear-gradient(180deg, #f8fbff 0%, #f0f6ff 100%); }
    .tile.all { background: linear-gradient(180deg, #f3f8ff 0%, var(--blue-soft) 100%); border-color: #cfe0ff; }
    .tile-title { font-size: 16px; font-weight: 700; margin: 0 0 8px; }
    .tile-sub { font-size: 12px; color: var(--muted); margin: 0 0 10px; min-height: 17px; }
    .meta { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--muted); }
    .count { font-size: 20px; font-weight: 700; color: var(--text); }
    .tile-actions { display: flex; justify-content: flex-end; margin-bottom: 6px; }
    .tile-delete {
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #991b1b;
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .tile-delete:hover { background: #ffe4e6; }
    .empty { border: 1px dashed #cbd5e1; border-radius: 12px; padding: 30px 20px; text-align: center; color: var(--muted); margin-top: 10px; background: #fbfdff; }

    #loginScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #loginScreen.visible { display: flex; }
    .login-box {
      background: var(--panel);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 30px;
      width: 100%;
      max-width: 380px;
      border: 1px solid #e5edf6;
    }
    .login-box h2 { margin: 0 0 8px; }
    .login-box p { margin: 0 0 18px; color: var(--muted); font-size: 14px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; }
    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dbe5f2;
      border-radius: 10px;
      font-size: 15px;
    }
    .msg { margin-top: 10px; font-size: 13px; color: var(--muted); display: none; }

    @media (max-width: 700px) {
      .shell { padding: 16px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .kpis { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-box">
      <h2>Command Center</h2>
      <p>Sign in with your username and password.</p>
      <div class="form-group">
        <label class="form-label" for="loginUsername">Username</label>
        <input type="text" id="loginUsername" class="form-input" placeholder="Username" autocomplete="username" onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button type="button" class="btn btn-primary" id="loginBtn" onclick="doLogin()" style="width:100%;justify-content:center;">Log in</button>
      <p id="loginMessage" class="msg"></p>
    </div>
  </div>

  <div class="shell" id="appContent">
    <div class="topbar">
      <div class="brand">
        <div>
          <h1>Dataset Library</h1>
          <p>Select a dataset tile to open the leads dashboard</p>
        </div>
      </div>
      <div>
        <input type="file" id="datasetFileInput" accept=".csv" style="display:none;" onchange="handleDatasetUpload(event)">
        <button class="btn" onclick="document.getElementById('datasetFileInput').click()">Import Dataset</button>
        <a class="btn btn-primary" href="/dashboard">Open All Leads Dashboard</a>
        <button class="btn" id="logoutBtn" onclick="logout()" style="display:none;">Log out</button>
      </div>
    </div>

    <div class="panel">
      <div class="kpis">
        <div class="kpi"><div class="label">Total Leads</div><div class="value" id="kpiTotal">0</div></div>
        <div class="kpi"><div class="label">Datasets</div><div class="value" id="kpiDatasets">0</div></div>
        <div class="kpi"><div class="label">Initial Data</div><div class="value" id="kpiInitial">0</div></div>
      </div>

      <div id="tiles" class="tiles"></div>
      <div id="emptyState" class="empty" style="display:none;">No datasets yet. Import your first CSV here and it will appear as a tile.</div>
      <div id="statusMsg" class="empty" style="display:none; margin-top:12px; border-style:solid;"></div>
    </div>
  </div>

  <script>
    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const PRODUCTION_API = 'https://homeweek-ai-call-center-production.up.railway.app';
    const LOCAL_API = 'http://localhost:3000';
    const API_BASE_URL = window.API_BASE_URL || (isLocalhost ? LOCAL_API : PRODUCTION_API);
    const fetchOpts = (opts = {}) => ({ ...opts, credentials: 'include' });
    let authRequired = false;

    function setLoginMessage(text, isError) {
      const el = document.getElementById('loginMessage');
      if (!el) return;
      el.textContent = text;
      el.style.display = text ? 'block' : 'none';
      el.style.color = isError ? '#dc2626' : '#6b7280';
    }

    function showLoginScreen() {
      document.getElementById('loginScreen').classList.add('visible');
      document.getElementById('appContent').style.display = 'none';
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      setLoginMessage('');
    }

    function showApp() {
      document.getElementById('loginScreen').classList.remove('visible');
      document.getElementById('appContent').style.display = '';
    }

    async function checkAuth() {
      try {
        const res = await fetch(`${API_BASE_URL}/auth/me`, fetchOpts());
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok && data.user && data.user !== 'anonymous') {
          authRequired = true;
          showApp();
          document.getElementById('logoutBtn').style.display = 'inline-flex';
          await loadDatasets();
          return;
        }
        if (res.status === 401) {
          authRequired = true;
          showLoginScreen();
          return;
        }
        showApp();
        await loadDatasets();
      } catch (_) {
        showApp();
        await loadDatasets();
      }
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!username) { setLoginMessage('Enter your username.', true); return; }
      if (!password) { setLoginMessage('Enter your password.', true); return; }
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      setLoginMessage('');
      try {
        const res = await fetch(`${API_BASE_URL}/auth/login`, fetchOpts({
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        }));
        const data = await res.json().catch(() => ({}));
        if (data.ok) {
          showApp();
          document.getElementById('logoutBtn').style.display = 'inline-flex';
          await loadDatasets();
        } else {
          setLoginMessage(data.error || 'Login failed.', true);
        }
      } catch (_) {
        setLoginMessage('Network error. Try again.', true);
      }
      btn.disabled = false;
    }

    async function logout() {
      try {
        await fetch(`${API_BASE_URL}/auth/logout`, fetchOpts({ method: 'POST' }));
      } catch (_) {}
      document.getElementById('logoutBtn').style.display = 'none';
      showLoginScreen();
    }

    function toDashboard(datasetId, datasetName) {
      if (!datasetId) {
        window.location.href = '/dashboard';
        return;
      }
      const qs = new URLSearchParams({ dataset_id: datasetId, dataset_name: datasetName || '' });
      window.location.href = `/dashboard?${qs.toString()}`;
    }

    async function deleteDataset(datasetId, datasetName) {
      if (!datasetId) return;
      const label = datasetName || 'this dataset';
      const confirmed = window.confirm(`Delete "${label}" and all its leads? This cannot be undone.`);
      if (!confirmed) return;

      setStatus(`Deleting ${label}...`);
      try {
        const res = await fetch(`${API_BASE_URL}/datasets/${encodeURIComponent(datasetId)}`, fetchOpts({ method: 'DELETE' }));
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.error || 'Failed to delete dataset');
        setStatus(`Deleted ${data.dataset_name || label}`);
        await loadDatasets();
      } catch (err) {
        setStatus(err.message || 'Failed to delete dataset', true);
      }
    }

    function formatDate(iso) {
      if (!iso) return 'Date unavailable';
      try {
        return new Date(iso).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (_) {
        return 'Date unavailable';
      }
    }

    function esc(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById('statusMsg');
      if (!el) return;
      if (!message) {
        el.style.display = 'none';
        el.textContent = '';
        return;
      }
      el.style.display = 'block';
      el.textContent = message;
      el.style.color = isError ? '#b91c1c' : '#1e40af';
      el.style.background = isError ? '#fef2f2' : '#eff6ff';
      el.style.borderColor = isError ? '#fecaca' : '#bfdbfe';
    }

    async function handleDatasetUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const suggestedName = (file.name || 'Dataset').replace(/\.[^.]+$/, '') || 'Dataset';
      const enteredName = prompt('Dataset name for this upload:', suggestedName);
      if (enteredName === null) {
        event.target.value = '';
        return;
      }
      const datasetName = enteredName.trim() || suggestedName;

      const formData = new FormData();
      formData.append('csv', file);
      formData.append('dataset_name', datasetName);

      setStatus('Uploading dataset...');
      try {
        const res = await fetch(`${API_BASE_URL}/upload-csv`, fetchOpts({ method: 'POST', body: formData }));
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.error || 'Upload failed');

        setStatus(`Imported ${data.inserted} leads into ${data.dataset_name || datasetName}`);
        await loadDatasets();
      } catch (err) {
        setStatus(err.message || 'Upload failed', true);
      }

      event.target.value = '';
    }

    async function loadDatasets() {
      const res = await fetch(`${API_BASE_URL}/datasets`, fetchOpts());
      if (res.status === 401 && authRequired) {
        showLoginScreen();
        return;
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) {
        throw new Error(data.error || 'Failed to load datasets');
      }

      const initial = data.initial_data || { id: 'initial', name: 'Initial Data', row_count: 0 };
      const datasets = data.datasets || [];
      const datasetLeads = datasets.reduce((sum, d) => sum + Number(d.row_count || 0), 0);
      const total = Number(initial.row_count || 0) + datasetLeads;

      document.getElementById('kpiTotal').textContent = total;
      document.getElementById('kpiDatasets').textContent = datasets.length;
      document.getElementById('kpiInitial').textContent = Number(initial.row_count || 0);

      const cards = [];
      cards.push(`
        <div class="tile all" onclick="toDashboard('', 'All Leads')">
          <h3 class="tile-title">All Leads</h3>
          <p class="tile-sub">Combined view across every dataset</p>
          <div class="meta"><span>Rows</span><span class="count">${total}</span></div>
        </div>
      `);
      cards.push(`
        <div class="tile initial" onclick="toDashboard('initial', 'Initial Data')">
          <h3 class="tile-title">Initial Data</h3>
          <p class="tile-sub">Legacy and unassigned leads</p>
          <div class="meta"><span>Rows</span><span class="count">${Number(initial.row_count || 0)}</span></div>
        </div>
      `);

      for (const ds of datasets) {
        const safeName = esc(ds.name || 'Untitled Dataset');
        const safeFile = esc(ds.source_filename || 'Manual upload');
        const safeDate = esc(formatDate(ds.uploaded_at || ds.created_at));
        const encodedName = encodeURIComponent(ds.name || '');
        cards.push(`
          <div class="tile" onclick="toDashboard('${ds.id}', decodeURIComponent('${encodedName}'))">
            <div class="tile-actions">
              <button class="tile-delete" onclick="event.stopPropagation(); deleteDataset('${ds.id}', decodeURIComponent('${encodedName}'))">Delete</button>
            </div>
            <h3 class="tile-title">${safeName}</h3>
            <p class="tile-sub">${safeFile}</p>
            <div class="meta"><span>${safeDate}</span><span class="count">${Number(ds.row_count || 0)}</span></div>
          </div>
        `);
      }

      document.getElementById('tiles').innerHTML = cards.join('');
      const showEmpty = datasets.length === 0 && Number(initial.row_count || 0) === 0;
      document.getElementById('emptyState').style.display = showEmpty ? 'block' : 'none';
    }

    checkAuth();
  </script>
</body>
</html>
